# font configuration
font_family      fira code
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size 12.0

# font features for fira code ligatures
font_features firacode-regular +zero +onum

# transparency and blur
background_opacity 0.85
background_blur 32
dynamic_background_opacity yes

# window layout
remember_window_size  yes
initial_window_width  1200
initial_window_height 800
window_padding_width 4

# tab bar
tab_bar_edge top
tab_bar_style powerline
tab_powerline_style slanted

# hide window decorations (title bar and borders)
hide_window_decorations yes

# window border radius (macos and some linux compositors)
window_border_radius 12

# colors (dark blue theme - no green/yellow)
foreground #c5c8c6
background #000814
cursor #ffc300
cursor_text_color #000814

# selection colors
selection_foreground #c5c8c6
selection_background #003566

# black
color0 #1d1f21
color8 #969896

# red
color1 #cc6666
color9 #d19a9a

# green (replaced with blue-gray)
color2 #8abeb7
color10 #a4d4ce

# yellow (replaced with orange)
color3 #d99a5a
color11 #e5b083

# blue
color4 #81a2be
color12 #9db8d0

# magenta
color5 #b294bb
color13 #c7a9cc

# cyan
color6 #8abeb7
color14 #a4d4ce

# white
color7 #c5c8c6
color15 #ffffff

# tab bar colors
active_tab_foreground   #c5c8c6
active_tab_background   #003566
inactive_tab_foreground #969896
inactive_tab_background #001d3d
tab_bar_background      #000814

# url color
url_color #81a2be

# window borders
active_border_color #003566
inactive_border_color #001d3d

# useful keybindings

# window management
map ctrl+shift+enter new_window
map ctrl+shift+w close_window
map ctrl+shift+] next_window
map ctrl+shift+[ previous_window
map ctrl+shift+f move_window_forward
map ctrl+shift+b move_window_backward

# tab management
map ctrl+shift+t new_tab
map ctrl+shift+q close_tab
map ctrl+shift+right next_tab
map ctrl+shift+left previous_tab
map ctrl+shift+. move_tab_forward
map ctrl+shift+, move_tab_backward
map ctrl+shift+alt+t set_tab_title

# layout management
map ctrl+shift+l next_layout
map ctrl+shift+z toggle_layout stack

# font size adjustment
map ctrl+shift+equal change_font_size all +2.0
map ctrl+shift+minus change_font_size all -2.0
map ctrl+shift+0 change_font_size all 0

# clipboard
map ctrl+shift+c copy_to_clipboard
map ctrl+shift+v paste_from_clipboard
map ctrl+shift+s paste_from_selection

# scrolling
map ctrl+shift+up scroll_line_up
map ctrl+shift+down scroll_line_down
map ctrl+shift+page_up scroll_page_up
map ctrl+shift+page_down scroll_page_down
map ctrl+shift+home scroll_home
map ctrl+shift+end scroll_end
map ctrl+shift+h show_scrollback

# url hints
map ctrl+shift+e kitten hints
map ctrl+shift+p>f kitten hints --type path --program -
map ctrl+shift+p>l kitten hints --type line --program -
map ctrl+shift+p>w kitten hints --type word --program -
map ctrl+shift+p>h kitten hints --type hash --program -

# miscellaneous
map ctrl+shift+f11 toggle_fullscreen
map ctrl+shift+u kitten unicode_input
map ctrl+shift+f2 edit_config_file
map ctrl+shift+escape kitty_shell window

# clear terminal
map ctrl+shift+delete clear_terminal reset active

# performance
repaint_delay 10
input_delay 3
sync_to_monitor yes

# mouse
mouse_hide_wait 3.0
copy_on_select yes
strip_trailing_spaces smart

# bell
enable_audio_bell no
visual_bell_duration 0.0
window_alert_on_bell yes

# advanced
allow_remote_control yes
shell_integration enabled
